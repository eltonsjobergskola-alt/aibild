
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aiai.com</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    height: 100vh;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  .slider { width: 100%; height: 100vh; position: relative; }

  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.8s ease, transform 0.8s ease;
    transform: translateY(30px);
    pointer-events: none;
  }
  .slide.active { opacity: 1; transform: translateY(0); pointer-events: all; }

  /* Shared heading style */
  .slide-heading {
    position: absolute;
    top: 72px; left: 0; right: 0;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #fff;
    z-index: 10;
    pointer-events: none;
  }
  .slide-heading .grad {
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Slide 1 ── */
  .slide-1 { background: #000; }
  .slide-1 .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .slide-1 .orb {
    position: absolute;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(120,80,255,0.35) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 5s ease-in-out infinite;
  }

  /* ── Slide 2 ── */
  .slide-2 { background: #0a0a0a; }
  .slide-2 .bg-lines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -45deg, transparent, transparent 40px,
      rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px
    );
  }
  .slide-2 .content-area {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 140px 80px 80px;
    gap: 24px;
  }
  .slide-2 .card {
    flex: 1; height: 260px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
  }

  /* ── Slide 3 ── */
  .slide-3 { background: #050510; }
  .slide-3 .bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(100,120,255,0.18) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .slide-3 .img-row {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 32px;
    padding: 140px 80px 80px;
  }
  .slide-3 .img-placeholder {
    flex: 1; height: 100%;
    border-radius: 20px;
    border: 2px dashed rgba(124,58,237,0.4);
    background: rgba(124,58,237,0.05);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .slide-3 .img-icon {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid rgba(124,58,237,0.3);
    background: rgba(124,58,237,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .slide-3 .img-icon svg { width: 24px; height: 24px; opacity: 0.5; }
  .slide-3 .img-label {
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  /* ── Slide 4 ── */
  .slide-4 { background: #000; }
  .slide-4 .accent-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #7c3aed, #06b6d4, #10b981);
  }
  .slide-4 .content-area {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 60px; padding: 140px 80px 80px;
  }
  .slide-4 .link-block {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .slide-4 .link-pill {
    height: 52px; border-radius: 100px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.35);
  }
  .slide-4 .link-pill-wide { width: 320px; }
  .slide-4 .link-pill-mid  { width: 240px; opacity: 0.6; }
  .slide-4 .link-pill-sm   { width: 180px; opacity: 0.35; }

  /* ── Slide 5 ── */
  .slide-5 { background: #08080f; }
  .slide-5 .bg-glow {
    position: absolute;
    width: 700px; height: 350px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.18) 0%, transparent 70%);
    bottom: 0; left: 50%; transform: translateX(-50%);
  }
  .slide-5 .content-area {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 20px; padding: 140px 80px 80px;
  }
  .slide-5 .compare-col {
    flex: 1; height: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    display: flex; flex-direction: column; gap: 12px; padding: 24px;
  }
  .slide-5 .compare-col.highlight {
    background: rgba(124,58,237,0.1);
    border-color: rgba(124,58,237,0.35);
  }
  .slide-5 .compare-row {
    height: 14px; border-radius: 7px;
    background: rgba(255,255,255,0.07);
  }
  .slide-5 .compare-row.accent {
    background: rgba(124,58,237,0.25);
  }

  /* ── Slide 6 ── */
  .slide-6 { background: #0a0008; }
  .slide-6 .bg-lines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      90deg, transparent, transparent 60px,
      rgba(255,255,255,0.015) 60px, rgba(255,255,255,0.015) 61px
    );
  }
  .slide-6 .content-area {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 40px; padding: 140px 80px 80px;
  }
  .slide-6 .pro-col, .slide-6 .con-col {
    flex: 1; height: 100%; border-radius: 20px;
    padding: 28px; display: flex; flex-direction: column; gap: 14px;
  }
  .slide-6 .pro-col {
    background: rgba(16,185,129,0.07);
    border: 1px solid rgba(16,185,129,0.2);
  }
  .slide-6 .con-col {
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.2);
  }
  .slide-6 .col-tag {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; margin-bottom: 4px;
  }
  .slide-6 .pro-col .col-tag { background: rgba(16,185,129,0.15); }
  .slide-6 .con-col .col-tag { background: rgba(239,68,68,0.15); }
  .slide-6 .item-bar {
    height: 12px; border-radius: 6px;
  }
  .slide-6 .pro-col .item-bar { background: rgba(16,185,129,0.2); }
  .slide-6 .con-col .item-bar { background: rgba(239,68,68,0.2); }

  /* ── Slide 7 ── */
  .slide-7 { background: #000; }
  .slide-7 .bg-text {
    position: absolute;
    font-family: 'Syne', sans-serif;
    font-size: 200px; font-weight: 900;
    color: rgba(255,255,255,0.025);
    letter-spacing: -0.05em;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap; user-select: none;
  }
  .slide-7 .content-area {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 140px 80px 80px;
  }
  .slide-7 .summary-card {
    width: 600px; padding: 48px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .slide-7 .sum-line {
    height: 12px; border-radius: 6px;
    background: rgba(255,255,255,0.07);
  }
  .slide-7 .sum-line.accent {
    background: linear-gradient(90deg, rgba(124,58,237,0.4), rgba(6,182,212,0.2));
    width: 60%;
  }
  .slide-7 .sum-score {
    display: flex; gap: 8px; margin-top: 8px;
  }
  .slide-7 .score-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(124,58,237,0.5);
  }
  .slide-7 .score-dot.dim { background: rgba(255,255,255,0.1); }

  /* ── Navigation ── */
  .nav {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px; z-index: 100;
    background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 18px; border-radius: 100px;
  }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer; transition: all 0.3s; border: none;
  }
  .nav-dot.active { background: #7c3aed; width: 20px; border-radius: 3px; }
  .nav-arrow {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.7); font-size: 14px; transition: all 0.2s;
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.15); color: #fff; }

  .slide-num {
    position: fixed; top: 32px; right: 40px;
    font-size: 12px; color: rgba(255,255,255,0.2);
    z-index: 100; letter-spacing: 0.1em;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%, -50%) scale(1.12); opacity: 1; }
  }
</style>
</head>
<body>

<div class="slide-num" id="slideNum">01 / 07</div>

<div class="slider">

  <!-- Slide 1: Titel -->
  <div class="slide slide-1 active">
    <div class="bg-grid"></div>
    <div class="orb"></div>
    <div class="slide-heading">Titel</div>
  </div>

  <!-- Slide 2: Om AIAI.com -->
  <div class="slide slide-2">
    <div class="bg-lines"></div>
    <div class="slide-heading">Om <span class="grad">AIAI.com</span></div>
    <div class="content-area">
      <div class="card"></div>
      <div class="card"></div>
      <div class="card"></div>
    </div>
  </div>

  <!-- Slide 3: Bilder (platshållare) -->
  <div class="slide slide-3">
    <div class="bg-dots"></div>
    <div class="slide-heading" style="color:rgba(255,255,255,0.3); font-size:14px; font-family:sans-serif; font-weight:400; letter-spacing:0.15em; text-transform:uppercase; top:32px;">Bild 3</div>
    <div class="img-row">
      <div class="img-placeholder">
        <div class="img-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(124,58,237,0.7)" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
        <span class="img-label">Bild 1</span>
      </div>
      <div class="img-placeholder">
        <div class="img-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(124,58,237,0.7)" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
        <span class="img-label">Bild 2</span>
      </div>
    </div>
  </div>

  <!-- Slide 4: Länk -->
  <div class="slide slide-4">
    <div class="accent-bar"></div>
    <div class="slide-heading">Länk</div>
    <div class="content-area">
      <div class="link-block">
        <div class="link-pill link-pill-wide"></div>
        <div class="link-pill link-pill-mid"></div>
        <div class="link-pill link-pill-sm"></div>
      </div>
    </div>
  </div>

  <!-- Slide 5: Jämförelse -->
  <div class="slide slide-5">
    <div class="bg-glow"></div>
    <div class="slide-heading">Jämförelse</div>
    <div class="content-area">
      <div class="compare-col">
        <div class="compare-row" style="width:70%"></div>
        <div class="compare-row" style="width:90%"></div>
        <div class="compare-row" style="width:55%"></div>
        <div class="compare-row" style="width:80%"></div>
        <div class="compare-row" style="width:65%"></div>
      </div>
      <div class="compare-col highlight">
        <div class="compare-row accent" style="width:90%"></div>
        <div class="compare-row accent" style="width:75%"></div>
        <div class="compare-row accent" style="width:95%"></div>
        <div class="compare-row accent" style="width:80%"></div>
        <div class="compare-row accent" style="width:70%"></div>
      </div>
      <div class="compare-col">
        <div class="compare-row" style="width:60%"></div>
        <div class="compare-row" style="width:80%"></div>
        <div class="compare-row" style="width:45%"></div>
        <div class="compare-row" style="width:75%"></div>
        <div class="compare-row" style="width:55%"></div>
      </div>
    </div>
  </div>

  <!-- Slide 6: För- & nackdelar -->
  <div class="slide slide-6">
    <div class="bg-lines"></div>
    <div class="slide-heading">För- &amp; nackdelar</div>
    <div class="content-area">
      <div class="pro-col">
        <div class="col-tag">✓</div>
        <div class="item-bar" style="width:80%"></div>
        <div class="item-bar" style="width:65%"></div>
        <div class="item-bar" style="width:75%"></div>
        <div class="item-bar" style="width:55%"></div>
        <div class="item-bar" style="width:70%"></div>
      </div>
      <div class="con-col">
        <div class="col-tag">✗</div>
        <div class="item-bar" style="width:70%"></div>
        <div class="item-bar" style="width:50%"></div>
        <div class="item-bar" style="width:65%"></div>
        <div class="item-bar" style="width:45%"></div>
      </div>
    </div>
  </div>

  <!-- Slide 7: Min personliga sammanfattning -->
  <div class="slide slide-7">
    <div class="bg-text">AIAI</div>
    <div class="slide-heading" style="font-size: clamp(24px, 3.5vw, 48px);">Min personliga sammanfattning</div>
    <div class="content-area">
      <div class="summary-card">
        <div class="sum-line accent"></div>
        <div class="sum-line" style="width:100%"></div>
        <div class="sum-line" style="width:85%"></div>
        <div class="sum-line" style="width:92%"></div>
        <div class="sum-line" style="width:75%"></div>
        <div class="sum-score">
          <div class="score-dot"></div>
          <div class="score-dot"></div>
          <div class="score-dot"></div>
          <div class="score-dot"></div>
          <div class="score-dot dim"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Navigation -->
<div class="nav">
  <button class="nav-arrow" id="prevBtn">←</button>
  <button class="nav-dot active" data-index="0"></button>
  <button class="nav-dot" data-index="1"></button>
  <button class="nav-dot" data-index="2"></button>
  <button class="nav-dot" data-index="3"></button>
  <button class="nav-dot" data-index="4"></button>
  <button class="nav-dot" data-index="5"></button>
  <button class="nav-dot" data-index="6"></button>
  <button class="nav-arrow" id="nextBtn">→</button>
</div>

<script>
  let current = 0;
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.nav-dot');
  const slideNum = document.getElementById('slideNum');

  function goTo(n) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    slideNum.textContent = String(current + 1).padStart(2, '0') + ' / 07';
  }

  document.getElementById('nextBtn').onclick = () => goTo(current + 1);
  document.getElementById('prevBtn').onclick = () => goTo(current - 1);
  dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.index)));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
  });

  let startX = 0;
  document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  document.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) goTo(current + (diff > 0 ? 1 : -1));
  });
</script>
</body>
</html>
